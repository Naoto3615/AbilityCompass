{% comment %}
SVG アバターコンポーネント — render_avatar テンプレートタグから呼ばれる
変数: cfg (dict), size (int), skin_color (str), hair_color (str)
{% endcomment %}
<svg
  width="{{ size }}" height="{{ size }}"
  viewBox="0 0 120 120"
  xmlns="http://www.w3.org/2000/svg"
  style="display:block; border-radius:50%; overflow:visible;"
  aria-label="アバター"
>

  <!-- 背景円 -->
  <circle cx="60" cy="60" r="60" fill="#e8f5e9"/>

  <!-- 後ろ髪（long / curly のみ） -->
  {% if cfg.hair_style == "long" %}
    <ellipse cx="60" cy="80" rx="28" ry="30" fill="{{ hair_color }}"/>
  {% elif cfg.hair_style == "curly" %}
    <ellipse cx="60" cy="82" rx="26" ry="26" fill="{{ hair_color }}"/>
    <circle cx="37" cy="70" r="10" fill="{{ hair_color }}"/>
    <circle cx="83" cy="70" r="10" fill="{{ hair_color }}"/>
    <circle cx="41" cy="80" r="9"  fill="{{ hair_color }}"/>
    <circle cx="79" cy="80" r="9"  fill="{{ hair_color }}"/>
  {% endif %}

  <!-- 顔 -->
  <ellipse cx="60" cy="66" rx="30" ry="31" fill="{{ skin_color }}"/>

  <!-- ほっぺの赤み -->
  {% if cfg.rosy_cheeks %}
    <ellipse cx="41" cy="73" rx="8" ry="5" fill="#ffb3b3" opacity="0.55"/>
    <ellipse cx="79" cy="73" rx="8" ry="5" fill="#ffb3b3" opacity="0.55"/>
  {% endif %}

  <!-- 目 -->
  {% if cfg.eye_type == "round" %}
    <circle cx="50" cy="62" r="5"   fill="#1a1a1a"/>
    <circle cx="70" cy="62" r="5"   fill="#1a1a1a"/>
    <circle cx="52" cy="60" r="1.5" fill="white"/>
    <circle cx="72" cy="60" r="1.5" fill="white"/>
  {% elif cfg.eye_type == "happy" %}
    <path d="M45 63 Q50 57 55 63" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M65 63 Q70 57 75 63" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  {% else %}
    <!-- normal -->
    <ellipse cx="50" cy="62" rx="4"   ry="4.5" fill="#1a1a1a"/>
    <ellipse cx="70" cy="62" rx="4"   ry="4.5" fill="#1a1a1a"/>
    <circle  cx="52" cy="60" r="1.2"  fill="white"/>
    <circle  cx="72" cy="60" r="1.2"  fill="white"/>
  {% endif %}

  <!-- 眉毛 -->
  {% if cfg.expression == "worried" %}
    <path d="M45 53 Q50 57 55 53" stroke="#5a3e28" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M65 53 Q70 57 75 53" stroke="#5a3e28" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  {% else %}
    <path d="M45 55 Q50 50 55 55" stroke="#5a3e28" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M65 55 Q70 50 75 55" stroke="#5a3e28" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  {% endif %}

  <!-- 口 -->
  {% if cfg.expression == "happy" %}
    <path d="M50 77 Q60 86 70 77" stroke="#c97044" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M53 79 Q60 84 67 79" fill="#ff8a65" opacity="0.25"/>
  {% elif cfg.expression == "worried" %}
    <path d="M50 81 Q60 74 70 81" stroke="#c97044" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  {% else %}
    <!-- normal -->
    <line x1="52" y1="79" x2="68" y2="79" stroke="#c97044" stroke-width="2.5" stroke-linecap="round"/>
  {% endif %}

  <!-- 鼻 -->
  <ellipse cx="60" cy="71" rx="3" ry="2" fill="#c8996a" opacity="0.45"/>

  <!-- 前髪 -->
  {% if cfg.hair_style == "short" %}
    <ellipse cx="60" cy="36" rx="28" ry="12" fill="{{ hair_color }}"/>
    <rect    x="32" y="36" width="56" height="8" fill="{{ hair_color }}"/>
    <ellipse cx="43" cy="46" rx="9" ry="6" fill="{{ hair_color }}"/>
    <ellipse cx="77" cy="46" rx="9" ry="6" fill="{{ hair_color }}"/>
  {% elif cfg.hair_style == "long" %}
    <ellipse cx="60" cy="34" rx="28" ry="12" fill="{{ hair_color }}"/>
    <rect    x="32" y="34" width="56" height="7" fill="{{ hair_color }}"/>
    <ellipse cx="43" cy="44" rx="9" ry="6" fill="{{ hair_color }}"/>
    <ellipse cx="77" cy="44" rx="9" ry="6" fill="{{ hair_color }}"/>
  {% elif cfg.hair_style == "curly" %}
    <ellipse cx="60" cy="35" rx="28" ry="12" fill="{{ hair_color }}"/>
    <rect    x="32" y="35" width="56" height="8" fill="{{ hair_color }}"/>
    <circle cx="38" cy="44" r="10" fill="{{ hair_color }}"/>
    <circle cx="82" cy="44" r="10" fill="{{ hair_color }}"/>
    <circle cx="50" cy="48" r="9"  fill="{{ hair_color }}"/>
    <circle cx="70" cy="48" r="9"  fill="{{ hair_color }}"/>
  {% endif %}
  <!-- none: 髪なし（つるつる） — 何も描かない -->

  <!-- アクセサリー：眼鏡 -->
  {% if cfg.accessory == "glasses" %}
    <ellipse cx="50" cy="62" rx="8.5" ry="7" fill="none" stroke="#4a4a4a" stroke-width="2.2"/>
    <ellipse cx="70" cy="62" rx="8.5" ry="7" fill="none" stroke="#4a4a4a" stroke-width="2.2"/>
    <line x1="58.5" y1="62" x2="61.5" y2="62" stroke="#4a4a4a" stroke-width="2.2"/>
    <line x1="35"   y1="60" x2="41.5" y2="62" stroke="#4a4a4a" stroke-width="2.2"/>
    <line x1="85"   y1="60" x2="78.5" y2="62" stroke="#4a4a4a" stroke-width="2.2"/>
  {% endif %}

  <!-- 仕事アウトフィット -->
  {% if cfg.job_outfit == "farming" %}
    <!-- 麦わら帽子 -->
    <ellipse cx="60" cy="34" rx="36" ry="8"  fill="#c8a84b"/>
    <ellipse cx="60" cy="30" rx="23" ry="15" fill="#d4b45a"/>
    <ellipse cx="60" cy="34" rx="36" ry="5"  fill="#a07828" opacity="0.4"/>
    <path d="M24 34 Q60 38 96 34" stroke="#8a6320" stroke-width="1.2" fill="none" opacity="0.5"/>
    <path d="M32 34 Q60 37 88 34" stroke="#8a6320" stroke-width="1"   fill="none" opacity="0.3"/>
  {% elif cfg.job_outfit == "manufacturing" %}
    <!-- ヘルメット -->
    <ellipse cx="60" cy="37" rx="30" ry="18" fill="#ffd700"/>
    <rect x="30" y="46" width="60" height="6" rx="3" fill="#e6c000"/>
    <rect x="46" y="38" width="28" height="4" rx="2" fill="white" opacity="0.55"/>
  {% elif cfg.job_outfit == "cleaning" %}
    <!-- バンダナ -->
    <ellipse cx="60" cy="38" rx="29" ry="13" fill="#4fc3f7"/>
    <rect x="31" y="38" width="58" height="7" fill="#29b6f6"/>
    <ellipse cx="60" cy="45" rx="29" ry="4" fill="#0288d1" opacity="0.4"/>
    <!-- 結び目（右耳あたり） -->
    <circle cx="83" cy="40" r="5"  fill="#4fc3f7" stroke="#29b6f6" stroke-width="1.2"/>
    <path d="M83 35 Q90 29 88 38" stroke="#29b6f6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M83 45 Q90 51 88 42" stroke="#29b6f6" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  {% elif cfg.job_outfit == "food" %}
    <!-- コック帽 -->
    <ellipse cx="60" cy="44" rx="25" ry="5"  fill="white" stroke="#ddd" stroke-width="1.5"/>
    <ellipse cx="60" cy="30" rx="20" ry="18" fill="white" stroke="#ddd" stroke-width="1.5"/>
    <rect x="35" y="40" width="50" height="9" rx="2" fill="white" stroke="#ddd" stroke-width="1.5"/>
  {% elif cfg.job_outfit == "retail" %}
    <!-- ネームタグ（胸元） -->
    <rect x="44" y="90" width="32" height="20" rx="4" fill="white" stroke="#43a047" stroke-width="2"/>
    <rect x="48" y="93" width="24" height="5"  rx="2.5" fill="#43a047" opacity="0.75"/>
    <rect x="48" y="100" width="16" height="3" rx="1.5" fill="#9e9e9e" opacity="0.45"/>
  {% endif %}

  <!-- バッジ -->
  {% if cfg.badge_count >= 1 %}
    <circle cx="96" cy="24" r="11" fill="#ffd700" stroke="white" stroke-width="2.5"/>
    <text x="96" y="28" text-anchor="middle" font-size="10" fill="#7b5800">★</text>
  {% endif %}
  {% if cfg.badge_count >= 5 %}
    <circle cx="19" cy="24" r="11" fill="#22c55e" stroke="white" stroke-width="2.5"/>
    <text x="19" y="28" text-anchor="middle" font-size="10" fill="white">♦</text>
  {% endif %}
  {% if cfg.badge_count >= 10 %}
    <circle cx="96" cy="96" r="11" fill="#f97316" stroke="white" stroke-width="2.5"/>
    <text x="96" y="100" text-anchor="middle" font-size="10" fill="white">♠</text>
  {% endif %}

</svg>
